<!doctype html>
<meta charset="utf-8">
<title>Live Earth — GOES</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css">
<style>
  html,body,#map{margin:0;height:100%}
  #cap{position:fixed;left:10px;bottom:10px;z-index:1;color:#fff;
       font:13px/1.4 system-ui,sans-serif;background:rgba(0,0,0,.55);
       padding:6px 10px;border-radius:8px}
  #cap b{color:#7fd}
  #cap a{color:#9cf}
</style>
<div id="map"></div>
<div id="cap">🛰 <b>Live</b> GOES-East · <span id="t">loading…</span> · <a href="/">seanpatten.com</a></div>
<script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
<script>
// Near-real-time GOES-East GeoColor from NASA GIBS (public, no key, "default" = latest).
const GOES = 'https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/'
           + 'GOES-East_ABI_GeoColor/default/default/GoogleMapsCompatible_Level7/{z}/{y}/{x}.png';

const map = new maplibregl.Map({
  container:'map', center:[-90,25], zoom:3.2, maxZoom:9,
  style:{version:8, sources:{}, layers:[{id:'bg',type:'background',paint:{'background-color':'#000'}}]}
});
map.addControl(new maplibregl.NavigationControl());

function refresh(){
  const url = GOES + '?_=' + Date.now();           // cache-bust so we pull the newest scan
  const src = map.getSource('goes');
  if(src){ src.setTiles([url]); }
  else{
    map.addSource('goes',{type:'raster',tiles:[url],tileSize:256,maxzoom:7,
      attribution:'NASA GIBS · NOAA GOES-East'});
    map.addLayer({id:'goes',type:'raster',source:'goes'});
  }
  document.getElementById('t').textContent = 'updated ' + new Date().toLocaleTimeString();
}
map.on('load', ()=>{ refresh(); setInterval(refresh, 5*60*1000); });
</script>
