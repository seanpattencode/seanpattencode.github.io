<!doctype html>
<meta charset=utf-8>
<title>Pong — Sean Patten</title>
<meta name=viewport content="width=device-width,initial-scale=1,user-scalable=no">
<style>
*{margin:0;box-sizing:border-box}
html,body{height:100%;background:#000;color:#fff;font:16px/1.5 system-ui,sans-serif;overflow:hidden;touch-action:none}
#c{position:absolute;inset:0;margin:auto;background:#000}
#o{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1em;text-align:center;padding:1em;background:#000d}
#o.hide{display:none}
button,input{font:inherit;padding:.5em 1em;background:#111;color:#fff;border:1px solid #fff;border-radius:6px}
button{cursor:pointer}button:active{background:#fff;color:#000}
.row{display:flex;gap:.5em}
a{color:#6af}#code{font-size:2.6em;letter-spacing:.12em;font-weight:700}
#stat{position:absolute;top:.4em;left:.5em;font:.8em monospace;color:#9f9;opacity:.85}
small{color:#888}
</style>
<canvas id=c></canvas>
<div id=stat></div>
<div id=o>
 <h1>PONG</h1>
 <p id=msg>Two players, real time over the internet.<br>Create a game and share the link, or enter a code.</p>
 <button id=create>Create game</button>
 <div class=row><input id=join placeholder=CODE maxlength=4 autocapitalize=characters autocomplete=off><button id=joinb>Join</button></div>
 <p><small>move: mouse · touch · W/S · ↑/↓ — first to 11</small></p>
 <p><small><a href=/games/>← games</a></small></p>
</div>
<audio id=bgm src="pixel-dreams.mp3" loop preload=auto></audio>
<script>{const b=document.getElementById('bgm'),go=()=>b.play().catch(()=>{});addEventListener('pointerdown',go,{once:true});addEventListener('keydown',go,{once:true})}</script>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
const W=1.5,H=1,PH=.18,PW=.022,IN=.03,BR=.017,WIN=11
const c=document.getElementById('c'),x=c.getContext('2d'),o=document.getElementById('o'),msg=document.getElementById('msg'),statEl=document.getElementById('stat')
let peer,conn,role,connected=false
let myY=.5,plY=.5,prY=.5,keyV=0
let ball={x:W/2,y:H/2,vx:0,vy:0},sl=0,sr=0,over=0
let lastT=0,ping=0,peerT=0,lastRx=0
const clamp=v=>v<PH/2?PH/2:v>H-PH/2?H-PH/2:v

function resize(){const d=devicePixelRatio||1;let w=innerWidth,h=w/(W/H);if(h>innerHeight){h=innerHeight;w=h*(W/H)}c.style.width=w+'px';c.style.height=h+'px';c.width=w*d|0;c.height=h*d|0}
addEventListener('resize',resize);resize()

const setMy=y=>{const r=c.getBoundingClientRect();myY=clamp((y-r.top)/r.height*H)}
c.addEventListener('pointermove',e=>setMy(e.clientY))
c.addEventListener('touchmove',e=>{e.preventDefault();setMy(e.touches[0].clientY)},{passive:false})
addEventListener('keydown',e=>{if(e.target.tagName=='INPUT')return;if(e.key=='ArrowUp'||e.key=='w')keyV=-1;else if(e.key=='ArrowDown'||e.key=='s')keyV=1;else if(e.key==' '&&over&&role=='host'){sl=sr=0;over=0;serve(1)}})
addEventListener('keyup',e=>{if(['ArrowUp','ArrowDown','w','s'].includes(e.key))keyV=0})
window.setPaddle=y=>myY=clamp(y) // test hook

function code4(){let s='',a='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';for(let i=0;i<4;i++)s+=a[Math.random()*a.length|0];return s}
document.getElementById('create').onclick=createGame
document.getElementById('joinb').onclick=()=>{const v=document.getElementById('join').value.toUpperCase().trim();if(v)joinGame(v)}
if(location.hash.length>1)joinGame(location.hash.slice(1).toUpperCase())

function createGame(){const CODE=code4();role='host';msg.textContent='Creating…'
 peer=new Peer('seanpong-'+CODE,{debug:0})
 peer.on('open',()=>{location.hash=CODE;window.__code=CODE;const u=location.href
  o.innerHTML=`<h1>PONG</h1><p>Share this — opponent opens it or enters the code:</p><div id=code>${CODE}</div><p style=word-break:break-all><a href="${u}">${u}</a></p><p>Waiting for opponent… <small>(link copied)</small></p>`
  navigator.clipboard&&navigator.clipboard.writeText(u).catch(()=>{})})
 peer.on('connection',ch=>{conn=ch;wire(ch)})
 peer.on('error',e=>e.type=='unavailable-id'?(peer.destroy(),createGame()):showErr(e.type))}

function joinGame(CODE,tries){tries=tries||0;role='guest';msg.textContent='Connecting to '+CODE+'…'
 peer=new Peer({debug:0})
 peer.on('open',()=>{conn=peer.connect('seanpong-'+CODE,{reliable:false});wire(conn)})
 peer.on('error',e=>e.type=='peer-unavailable'&&tries<4?(peer.destroy(),setTimeout(()=>joinGame(CODE,tries+1),700)):showErr(e.type=='peer-unavailable'?'No game with code '+CODE:e.type))}

function wire(ch){
 ch.on('open',()=>{connected=true;o.classList.add('hide');lastT=performance.now();if(role=='host')serve(1);requestAnimationFrame(loop)})
 ch.on('data',d=>{lastRx=performance.now()
  if(role=='host'){if(d.p!=null)prY=d.p;if(d.a!=null)ping=performance.now()-d.a}
  else{ball.x=d.b[0];ball.y=d.b[1];plY=d.pl;sl=d.sl;sr=d.sr;over=d.o;peerT=d.t}})
 ch.on('close',()=>{connected=false;showErr('Opponent left. Reload to play again.')})}

function showErr(m){o.classList.remove('hide');o.innerHTML='<h1>PONG</h1><p>'+m+'</p><p><a href=.>reload</a></p>'}
const send=m=>{try{conn&&conn.open&&conn.send(m)}catch(e){}}
function serve(dir){ball.x=W/2;ball.y=H/2;const a=Math.random()*.6-.3;ball.vx=dir*.9*Math.cos(a);ball.vy=.9*Math.sin(a)}

function sim(dt){if(over)return
 ball.x+=ball.vx*dt;ball.y+=ball.vy*dt
 if(ball.y<BR){ball.y=BR;ball.vy=Math.abs(ball.vy)} if(ball.y>H-BR){ball.y=H-BR;ball.vy=-Math.abs(ball.vy)}
 if(ball.vx<0&&ball.x-BR<IN+PW&&ball.x>IN&&Math.abs(ball.y-plY)<PH/2+BR){ball.x=IN+PW+BR;bounce(plY,1)}
 if(ball.vx>0&&ball.x+BR>W-IN-PW&&ball.x<W-IN&&Math.abs(ball.y-prY)<PH/2+BR){ball.x=W-IN-PW-BR;bounce(prY,-1)}
 if(ball.x<-BR){sr++;done()||serve(-1)} else if(ball.x>W+BR){sl++;done()||serve(1)}}
function bounce(pY,dir){const off=(ball.y-pY)/(PH/2),sp=Math.min(2.4,Math.hypot(ball.vx,ball.vy)*1.06),a=off*1.1;ball.vx=dir*sp*Math.cos(a);ball.vy=sp*Math.sin(a)}
function done(){return(sl>=WIN||sr>=WIN)?(over=sl>=WIN?1:2,ball.vx=ball.vy=0,1):0}

function loop(t){const dt=Math.min(.05,(t-lastT)/1000)||0;lastT=t
 if(keyV)myY=clamp(myY+keyV*1.6*dt)
 if(role=='host'){plY=myY;sim(dt);send({b:[ball.x,ball.y],pl:plY,pr:prY,sl,sr,o:over,t})}
 else{prY=myY;send({p:prY,a:peerT})}
 draw()
 window.__net={role,connected,ball:{x:ball.x,y:ball.y},opp:role=='host'?prY:plY,ping,lastRx}
 requestAnimationFrame(loop)}

function rect(fx,fy,fw,fh,s){x.fillRect(fx*s,fy*s,fw*s,fh*s)}
function draw(){const w=c.width,h=c.height,s=w/W;x.fillStyle='#000';x.fillRect(0,0,w,h);x.fillStyle='#fff'
 x.globalAlpha=.5;for(let i=h/48;i<h;i+=h/16)x.fillRect(w/2-s*.004,i,s*.008,h/32);x.globalAlpha=1
 rect(IN,plY-PH/2,PW,PH,s);rect(W-IN-PW,prY-PH/2,PW,PH,s)
 x.beginPath();x.arc(ball.x*s,ball.y*s,BR*s,0,7);x.fill()
 x.textAlign='center';x.font=.13*h+'px system-ui';x.fillText(sl,w*.25,.16*h);x.fillText(sr,w*.75,.16*h)
 x.globalAlpha=.55;x.font=.034*h+'px system-ui';x.fillText(role=='host'?'YOU':'OPP',w*.12,.98*h);x.fillText(role=='guest'?'YOU':'OPP',w*.88,.98*h);x.globalAlpha=1
 if(over){x.font=.09*h+'px system-ui';x.fillText((over==1?'LEFT':'RIGHT')+' WINS',w/2,h/2);if(role=='host'){x.font=.038*h+'px system-ui';x.fillText('press space to play again',w/2,h*.6)}}
 statEl.textContent=connected?role+'  ping '+Math.round(ping)+'ms':''}
</script>
