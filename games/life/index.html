<!doctype html>
<meta charset=utf-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<title>life</title>
<style>html{color-scheme:dark}body{margin:0;background:#000}canvas{display:block}p{position:fixed;bottom:8px;width:100%;text-align:center;margin:0;color:#888;font:14px system-ui}a{color:#6af}</style>
<canvas id=c></canvas>
<p>Conway's Game of Life &middot; click reseeds &middot; <a href=/games/>games</a></p>
<script>
var Z=8,x=c.getContext('2d'),W,H,g,i
function seed(){W=innerWidth/Z|0;H=innerHeight/Z|0;c.width=W*Z;c.height=H*Z;g=[];for(i=0;i<W*H;i++)g[i]=Math.random()<.3?1:0}
function step(){g=g.map((v,i)=>{for(var X=i%W,Y=i/W|0,s=0,dy=-1;dy<2;dy++)for(var dx=-1;dx<2;dx++)if(dx||dy)s+=g[((Y+dy+H)%H)*W+(X+dx+W)%W];return s==3||v&&s==2?1:0});x.fillStyle='#000';x.fillRect(0,0,c.width,c.height);x.fillStyle='#6f6';for(i=0;i<W*H;i++)if(g[i])x.fillRect(i%W*Z,(i/W|0)*Z,Z-1,Z-1)}
seed();setInterval(step,80);onclick=seed;onresize=seed
</script>
