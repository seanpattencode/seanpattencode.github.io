<!doctype html>
<meta charset=utf-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<title>life</title>
<style>html{color-scheme:dark}body{margin:0;background:#000}canvas{display:block;touch-action:none}p{position:fixed;bottom:8px;width:100%;text-align:center;margin:0;color:#888;font:14px system-ui}a{color:#6af}</style>
<canvas id=c></canvas>
<p>Conway's Game of Life &middot; click/drag draws &middot; space pause &middot; r random &middot; c clear &middot; <a href=/games/>games</a></p>
<script>
var Z=8,x=c.getContext('2d'),W,H,g,i,run=1,dn=0
function seed(){W=innerWidth/Z|0;H=innerHeight/Z|0;c.width=W*Z;c.height=H*Z;g=[];for(i=0;i<W*H;i++)g[i]=Math.random()<.3?1:0;draw()}
function draw(){x.fillStyle='#000';x.fillRect(0,0,c.width,c.height);x.fillStyle='#6f6';for(i=0;i<W*H;i++)if(g[i])x.fillRect(i%W*Z,(i/W|0)*Z,Z-1,Z-1)}
function step(){if(run){g=g.map((v,i)=>{for(var X=i%W,Y=i/W|0,s=0,dy=-1;dy<2;dy++)for(var dx=-1;dx<2;dx++)if(dx||dy)s+=g[((Y+dy+H)%H)*W+(X+dx+W)%W];return s==3||v&&s==2?1:0});draw()}}
function put(e){var X=e.clientX/Z|0,Y=e.clientY/Z|0;if(X<W&&Y<H){g[Y*W+X]=1;draw()}}
seed();setInterval(step,80)
onpointerdown=e=>{dn=1;put(e)};onpointermove=e=>{if(dn)put(e)};onpointerup=()=>dn=0
onresize=seed;onkeydown=e=>{if(e.key==' ')run=!run;if(e.key=='r')seed();if(e.key=='c'){g=Array(W*H).fill(0);draw()}}
</script>
