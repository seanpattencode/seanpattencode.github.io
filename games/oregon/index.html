<!doctype html>
<meta charset=utf-8>
<title>Oregon Trail (1978)</title>
<meta name=viewport content="width=device-width,initial-scale=1">
<script src=coi-serviceworker.min.js></script>
<style><!--
body{background:#000;color:#3f3;font:14px/1.4 ui-monospace,Menlo,monospace;max-width:62em;margin:1em auto;padding:0 1em}
#bar{display:flex;justify-content:space-between;flex-wrap:wrap;gap:.5em;color:#3f38;margin-bottom:1em}
a{color:#3f3}
pre{white-space:pre-wrap;margin:0;word-break:break-word}
form{display:flex;gap:.5em;margin:.6em 0 2em}
input{flex:1;background:#000;color:#3f3;border:1px solid #3f36;font:inherit;font-size:16px;padding:.35em .5em}
button{background:#000;color:#3f3;border:1px solid #3f36;font:inherit;padding:.35em .8em}
--></style>
<div id=bar><span>OREGON TRAIL — Bill Heinemann 1971 · Creative Computing, May 1978 · public domain</span>
<span><a href=oregon_trail.py>source.py</a> · <a href=../>games</a></span></div>
<pre id=out>LOADING PYTHON… (~10 MB, first visit only)</pre>
<form id=f><input id=i autofocus autocomplete=off enterkeyhint=send placeholder="type answers here"><button>send</button></form>
<script>
const out = document.getElementById('out'), inp = document.getElementById('i')
if (!crossOriginIsolated) {
    out.textContent = 'INITIALIZING… (first visit reloads once)'
} else {
    const sab = new SharedArrayBuffer(4096), ctl = new Int32Array(sab, 0, 2),
          buf = new Uint8Array(sab, 8), enc = new TextEncoder()
    const w = new Worker('worker.js'); w.postMessage(sab)
    let booted = false, asking = false, q = []
    const feed = line => {
        const b = enc.encode(line).slice(0, 4088)
        buf.set(b); ctl[1] = b.length
        asking = false; Atomics.store(ctl, 0, 1); Atomics.notify(ctl, 0)
    }
    w.onmessage = e => {
        if (e.data === 0) { q.length ? feed(q.shift()) : asking = true; return }
        if (!booted) { booted = true; out.textContent = '' }
        out.append(e.data); window.scrollTo(0, document.body.scrollHeight)
    }
    document.getElementById('f').onsubmit = e => {
        e.preventDefault()
        const line = inp.value; inp.value = ''
        out.append(line + '\n'); window.scrollTo(0, document.body.scrollHeight)
        asking ? feed(line) : q.push(line)
        inp.focus()
    }
}
</script>
