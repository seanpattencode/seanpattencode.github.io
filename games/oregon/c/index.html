const out=document.getElementById('out'),inp=document.getElementById('i')
const bin=Uint8Array.from(atob(B64),c=>c.charCodeAt(0))
const dec=new TextDecoder(),enc=new TextEncoder()
let chunk='',E=null
window.LAT=[]
let promptAt=performance.now()
const show=s=>{out.append(s);window.scrollTo(0,document.body.scrollHeight);promptAt=performance.now()}
WebAssembly.instantiate(bin,{env:{p:(q,n)=>chunk+=dec.decode(new Uint8Array(E.memory.buffer,q,n))}}).then(w=>{
    E=w.instance.exports
    E.ot_boot((Date.now()^performance.now()*1e3)>>>0)
    show(chunk)
    window.READY=performance.now()})
document.getElementById('f').onsubmit=e=>{
    e.preventDefault()
    if(!E)return
    const line=inp.value;inp.value=''
    const ms=performance.now()-promptAt
    out.append(line+'\n')
    const t0=performance.now()
    const b=enc.encode(line).slice(0,255)
    new Uint8Array(E.memory.buffer,E.ot_in(),b.length).set(b)
    chunk=''
    E.ot_feed(b.length,ms)
    show(chunk+(E.ot_over()?'\n[ GAME OVER — refresh to ride again ]':''))
    window.LAT.push(performance.now()-t0)
    inp.focus()}
