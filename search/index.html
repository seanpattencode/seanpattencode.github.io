let t0=performance.now(),R=[];
const T={}; // every prefix to 3 chars -> ranked completions, precomputed
for(let i=0;i<D.length;i++)for(let L=1;L<4;L++){const k=D[i].slice(0,L);(T[k]||(T[k]=[])).push(i)}
st.textContent=D.length+' sites · all ≤3-char completions precomputed in '+(performance.now()-t0).toFixed(0)+'ms';
addEventListener('pointerdown',e=>{const a=e.target.closest('a[href]');if(a){e.preventDefault();a.click()}},true);
f.onsubmit=e=>{e.preventDefault();if(R.length)location='https://'+D[R[0]]};
q.oninput=()=>{
  const t=performance.now(),s=q.value.toLowerCase().replace(/\s+/g,'');
  const b=s?T[s.slice(0,3)]||[]:[];
  R=s.length>3?b.filter(i=>D[i].startsWith(s)):b;
  out.innerHTML=R.slice(0,20).map(i=>`<div class=r><i>#${i+1}</i><a href="https://${D[i]}">${D[i]}</a></div>`).join('');
  const us=(performance.now()-t)*1000;
  st.textContent=s?R.length+' sites · '+(us<1000?Math.round(us)+'µs':(us/1000).toFixed(2)+'ms')+' · enter = top hit':D.length+' sites';
};
</script>
