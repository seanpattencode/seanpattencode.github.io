<!doctype html>
<meta charset=utf-8>
<title>Search — Sean Patten</title>
<meta name=viewport content="width=device-width,initial-scale=1">
<link rel=search type=application/opensearchdescription+xml title="Sean Patten Search" href=/search/opensearch.xml>
<style><!--
body{margin:0;min-height:100vh;background:#000;color:#aaa;font-family:system-ui;display:flex;flex-direction:column;align-items:center}
#q{width:80vw;max-width:600px;font-size:24px;padding:16px;text-align:center;background:#000;color:#fff;border:1px solid #333;border-radius:8px;outline:none;caret-color:#4af}
#st{color:#345;font-size:15px;margin-top:10px;min-height:1.3em}
#out{width:90vw;max-width:600px;margin-top:24px}
.r{padding:6px 0;border-bottom:1px solid #222;display:flex;align-items:center;gap:14px}
.r i{color:#345;font-style:normal;min-width:3em;text-align:right;font-size:14px}
.r a{color:#4af;text-decoration:none;font-size:19px}
--></style>
<form id=f style=margin-top:9vh><input id=q autofocus placeholder="g → goo → google.com" autocomplete=off></form>
<div id=st></div>
<div id=out></div>
<script>
const q=document.getElementById('q'),st=document.getElementById('st'),out=document.getElementById('out');
const D=[],T={};let R=[],fin=0; // domains arrive in rank order: first stream match = global best
addEventListener('pointerdown',e=>{const a=e.target.closest('a[href]');if(a){e.preventDefault();a.click()}},true);
f.onsubmit=e=>{e.preventDefault();if(R.length)location='https://'+D[R[0]]};
q.oninput=()=>{
  const t=performance.now(),s=q.value.toLowerCase().replace(/\s+/g,'');
  const b=s?T[s.slice(0,3)]||[]:[];
  R=s.length>3?b.filter(i=>D[i].startsWith(s)):b;
  out.innerHTML=R.slice(0,20).map(i=>`<div class=r><i>#${i+1}</i><a href="https://${D[i]}">${D[i]}</a></div>`).join('');
  const us=(performance.now()-t)*1000;
  st.textContent=(s?R.length+' sites · '+(us<1000?Math.round(us)+'µs':(us/1000).toFixed(2)+'ms')+' · enter = top hit':D.length+' sites')+(fin?'':' · streaming…');
};
const pq=new URLSearchParams(location.search).get('q');
if(pq)q.value=pq.replace(/!$/,'');
(async()=>{
  const t0=performance.now();
  try{
    const rd=(await fetch('domains.txt')).body.getReader(),dec=new TextDecoder();let buf='';
    for(;;){const{value,done}=await rd.read();
      buf+=dec.decode(value||new Uint8Array,{stream:!done});
      const ls=buf.split('\n');buf=done?'':ls.pop();
      for(const d of ls)if(d){const i=D.length;D.push(d);for(let L=1;L<4;L++){const k=d.slice(0,L);(T[k]||(T[k]=[])).push(i)}}
      q.oninput();
      if(pq&&pq.endsWith('!')&&R.length)return location.replace('https://'+D[R[0]]);
      if(done)break}
    fin=1;
    if(q.value)q.oninput();else st.textContent=D.length+' sites · streamed + indexed in '+Math.round(performance.now()-t0)+'ms';
  }catch(e){st.textContent='index failed to load — reload'}
})();
</script>
